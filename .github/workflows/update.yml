name: Update Daily News

on:
  schedule:
    - cron: "0 22 * * *"  # 毎朝 7:00 JST (22:00 UTC)
  workflow_dispatch:        # 手動実行にも対応

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Generate index.html
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          OPENWEATHER_CITY: ${{ secrets.OPENWEATHER_CITY }}
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          NEWSDATA_COUNTRY: ${{ secrets.NEWSDATA_COUNTRY }}
          NEWSDATA_LANGUAGE: ${{ secrets.NEWSDATA_LANGUAGE }}
        run: python scripts/generate.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: update $(date -u +'%Y-%m-%d')"
          git push
